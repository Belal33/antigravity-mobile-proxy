<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="96"/>
  <!-- Glow layer -->
  <g filter="url(#glow)" opacity="0.4">
    <circle cx="256" cy="256" r="140" fill="none" stroke="url(#icon-grad)" stroke-width="8"/>
  </g>
  <!-- Globe icon scaled to fit -->
  <g transform="translate(256,256) scale(14) translate(-12,-12)">
    <circle cx="12" cy="12" r="10" fill="none" stroke="url(#icon-grad)" stroke-width="1.5"/>
    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" fill="none" stroke="url(#icon-grad)" stroke-width="1.5"/>
    <line x1="2" y1="12" x2="22" y2="12" stroke="url(#icon-grad)" stroke-width="1.5"/>
  </g>
</svg>