<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Antigravity Agent</title>
  <meta name="description" content="Chat with the Antigravity AI Agent from any browser">
  <!-- Modular CSS (order: tokens → reset → layout → components → features → utilities) -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/window-selector.css">
  <link rel="stylesheet" href="css/messages.css">
  <link rel="stylesheet" href="css/agent-steps.css">
  <link rel="stylesheet" href="css/markdown.css">
  <link rel="stylesheet" href="css/input.css">
  <link rel="stylesheet" href="css/artifacts.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/utilities.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <!-- Marked.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- highlight.js for code syntax highlighting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/highlight.min.js"></script>
</head>

<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <div class="header-left">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
            <line x1="2" y1="12" x2="22" y2="12" />
          </svg>
        </div>
        <div class="header-title">
          <h1>Antigravity</h1>
          <span class="header-subtitle" id="status-indicator">Agent</span>
        </div>
      </div>
      <div class="header-right">
        <!-- Window Selector -->
        <div class="window-selector-wrapper" id="window-selector-wrapper">
          <button id="window-selector-btn" class="window-selector-btn" title="Select Antigravity window"
            aria-label="Select window">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2" />
              <line x1="8" y1="21" x2="16" y2="21" />
              <line x1="12" y1="17" x2="12" y2="21" />
            </svg>
            <span id="window-selector-label">Window</span>
            <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5">
              <polyline points="6 9 12 15 18 9" />
            </svg>
          </button>
          <div class="window-dropdown" id="window-dropdown">
            <div class="window-dropdown-header">Antigravity Windows</div>
            <div id="window-list"></div>
          </div>
        </div>

        <button id="new-chat-btn" class="icon-btn" title="New Chat" aria-label="New Chat">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
        </button>
        <button id="artifacts-btn" class="icon-btn" title="Artifacts" aria-label="View Artifacts">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
          </svg>
        </button>
        <button id="settings-btn" class="icon-btn" title="Settings" aria-label="Settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
          </svg>
        </button>
      </div>
    </header>

    <!-- Artifact Panel (slide-out) -->
    <div id="artifact-panel" class="artifact-panel hidden">
      <div class="artifact-panel-header">
        <h3>📁 Artifacts</h3>
        <button id="artifact-close-btn" class="icon-btn" title="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div id="artifact-content">
        <div id="artifact-list" class="artifact-list">
          <div class="artifact-loading">Loading artifacts...</div>
        </div>
        <div id="artifact-viewer" class="artifact-viewer hidden">
          <div class="artifact-viewer-header">
            <button id="artifact-back-btn" class="artifact-back-btn">← Back</button>
            <span id="artifact-viewer-title" class="artifact-viewer-title"></span>
          </div>
          <div id="artifact-viewer-body" class="artifact-viewer-body"></div>
        </div>
      </div>
    </div>

    <!-- Messages Area -->
    <main id="messages" role="log" aria-live="polite">
      <div id="welcome-screen">
        <div class="welcome-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="url(#gradient)" stroke-width="1.5">
            <defs>
              <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#6366f1" />
                <stop offset="100%" style="stop-color:#a855f7" />
              </linearGradient>
            </defs>
            <circle cx="12" cy="12" r="10" />
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
            <line x1="2" y1="12" x2="22" y2="12" />
          </svg>
        </div>
        <h2>Antigravity Agent</h2>
        <p>Ask anything. The agent has access to your IDE — files, terminal, search, and more.</p>
        <div class="quick-prompts">
          <button class="quick-prompt" data-prompt="What files are in the current workspace?">📁 List workspace
            files</button>
          <button class="quick-prompt" data-prompt="Explain the architecture of this project">🏗️ Explain
            architecture</button>
          <button class="quick-prompt" data-prompt="Help me debug the most recent error">🐛 Debug last error</button>
        </div>
      </div>
    </main>

    <!-- Input Area -->
    <footer id="input-area">
      <div class="input-wrapper">
        <textarea id="chat-input" placeholder="Ask the Antigravity agent..." rows="1"
          aria-label="Chat message input"></textarea>
        <button id="send-btn" aria-label="Send message" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
        </button>
      </div>
      <div class="input-hint">
        <span>Enter to send · Shift+Enter for new line</span>
        <span id="model-info"></span>
      </div>
    </footer>
  </div>

  <!-- Modular JS (order: config → helpers → components → features → entry) -->
  <script src="js/config.js"></script>
  <script src="js/helpers.js"></script>
  <script src="js/components/agent-message.js"></script>
  <script src="js/components/thinking.js"></script>
  <script src="js/components/tool-card.js"></script>
  <script src="js/components/hitl.js"></script>
  <script src="js/components/message.js"></script>
  <script src="js/sse-handler.js"></script>
  <script src="js/api.js"></script>
  <script src="js/chat-history.js"></script>
  <script src="js/window-selector.js"></script>
  <script src="js/artifacts.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
